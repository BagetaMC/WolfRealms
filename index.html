<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Wolfino Network</title>

<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Fredoka One',cursive;
    background:#0d0d0d;
    color:white;
    overflow:hidden;
}

/* ===== VIEW SYSTEM ===== */
.view{
    display:none;
    width:100%;
    height:100vh;
    position:absolute;
}

.view.active{
    display:flex;
}

/* ===== HERO ===== */
.hero{
    justify-content:center;
    align-items:center;
    text-align:center;
    background:linear-gradient(135deg,#0d0d0d,#1a1a1a,#0d0d0d);
}

/* SMOKE */
.smoke{
    pointer-events:none;
    position:absolute;
    width:600px;
    height:600px;
    background:rgba(140,0,255,0.25);
    filter:blur(120px);
    border-radius:50%;
    animation:float 14s infinite ease-in-out;
}

.smoke:nth-child(1){left:-150px;top:100px;}
.smoke:nth-child(2){right:-150px;top:50px;}
.smoke:nth-child(3){bottom:-150px;left:35%;}

@keyframes float{
    0%{transform:translate(0,0);}
    50%{transform:translate(60px,-40px);}
    100%{transform:translate(0,0);}
}

/* TEXT */
h1{
    font-size:100px;
    text-shadow:0 0 25px #b366ff;
}

p{
    font-size:22px;
    color:#d9c7ff;
}

/* BUTTONS */
.buttons{
    position:relative;
    z-index:100;
    margin-top:25px;
    display:flex;
    flex-direction:column;
    gap:12px;
    align-items:center;
}

.row{
    display:flex;
    gap:12px;
}

.btn{
    padding:14px 28px;
    border-radius:12px;
    text-decoration:none;
    color:white;
    transition:.3s;
    cursor:pointer;
}

.btn:hover{
    transform:scale(1.08);
}

.discord{background:#5865F2;}
.store{background:#FFD000;color:black;}
.join{background:#7b2cff;}

/* SOCIALS */
.socials{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    gap:10px;
}

.social{
    width:45px;
    height:45px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    font-size:20px;
    text-decoration:none;
    color:white;
    animation:pop 2.5s infinite;
}

@keyframes pop{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-4px);}
}

.insta{background:linear-gradient(45deg,#f58529,#dd2a7b,#8134af);}
.yt{background:#ff0000;}
.mail{background:white;color:#e1306c;}

/* MENU */
.menu-btn{
    position:fixed;
    top:20px;
    right:20px;
    font-size:26px;
    background:#222;
    border:none;
    color:white;
    padding:10px 14px;
    border-radius:10px;
    z-index:999;
    cursor:pointer;
}

.menu{
    position:fixed;
    top:0;
    right:-300px;
    width:260px;
    height:100%;
    background:#111;
    transition:.4s;
    z-index:998;
    padding-top:80px;
}

.menu.open{
    right:0;
}

.menu a{
    display:block;
    padding:18px;
    border-bottom:1px solid #222;
    cursor:pointer;
}

.menu a:hover{
    background:#222;
}

/* SUPPORT */
.support-box{
    text-align:center;
}

.card{
    background:#1a1a1a;
    width:280px;
    margin:20px auto;
    padding:25px;
    border-radius:15px;
    transition:.3s;
}

.card:hover{
    transform:scale(1.05);
}

.title{
    font-size:28px;
    margin-bottom:10px;
}

.link{
    display:inline-block;
    margin-top:10px;
    padding:10px 20px;
    border-radius:10px;
    text-decoration:none;
    color:white;
    background:#333;
    transition:.3s;
}

.discord-card .link{background:#5865F2;}
.mail-card .link{background:#4aa3ff;}

.link:hover{
    transform:scale(1.1);
}

/* TOAST */
.toast{
    position:fixed;
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    background:#7b2cff;
    padding:12px 20px;
    border-radius:10px;
    opacity:0;
    transition:.3s;
}

.toast.show{opacity:1;}

#team{
    overflow-y:auto;
    padding-top:80px;
    padding-bottom:40px;
}
#team > div{
    max-height:none;
}
#support h1{
    font-size:70px;
}

</style>
</head>

<body>

<script>

function toggleMenu(){
    document.getElementById("menu").classList.toggle("open");
}

function show(id){
    document.querySelectorAll(".view")
    .forEach(v=>v.classList.remove("active"));

    document.getElementById(id).classList.add("active");

    document.getElementById("menu").classList.remove("open");
}

function copyIP(){
    navigator.clipboard.writeText("mc.wolfino.net");

    let t=document.getElementById("toast");
    t.classList.add("show");

    setTimeout(()=>t.classList.remove("show"),2000);
}
